name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

      - name: Build backend (basic check)
        working-directory: ./backend
        run: npm run start -- --help || true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t college-events-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t college-events-frontend ./frontend

